name: CI

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_QA_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/e2e_db
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.4.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Check code format
        run: pnpm format:check

      - name: Run build
        run: pnpm build

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && break
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: pnpm run db:migrate

      - name: Start Next
        run: pnpm start &
        env:
          PORT: 3000

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -sS http://localhost:3000 >/dev/null; then
              echo "App is up"
              break
            fi
            echo "Waiting for app..."
            sleep 1
          done

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-v15-{{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-v15-

      - name: Install Cypress binary
        run: pnpm run cypress:install

      - name: Run E2E (Cypress)
        run: pnpm run e2e:run
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          CYPRESS_BASE_URL: http://localhost:3000
          NODE_ENV: test
          NEXT_PUBLIC_DISABLE_CLERK: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      # - name: Run tests and build coverage report
      #   run: pnpm run test:coverage-report