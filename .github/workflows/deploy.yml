name: Vercel Deployment

on:
  push:
    branches:
      - main
      - 'releases/**'

jobs:
  Deploy-Preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate
          pnpm -v

      - name: Pull Vercel Environment Information (using pnpm dlx)
        run: pnpm dlx vercel@latest pull --yes --environment=preview --token $VERCEL_TOKEN

      - name: Build Project Artifacts (using pnpm dlx)
        run: pnpm dlx vercel@latest build --token $VERCEL_TOKEN

      - name: Deploy Project Artifacts to Vercel (using pnpm dlx)
        run: pnpm dlx vercel@latest deploy --prebuilt --token $VERCEL_TOKEN

  Deploy-Production:
    if: startsWith(github.ref, 'refs/heads/releases/')
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate
          pnpm -v

      - name: Pull Vercel Environment Information (using pnpm dlx)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token $VERCEL_TOKEN

      - name: Build Project Artifacts (using pnpm dlx)
        run: pnpm dlx vercel@latest build --prod --token $VERCEL_TOKEN

      - name: Deploy Project Artifacts to Vercel (using pnpm dlx)
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token $VERCEL_TOKEN